apiVersion: v1
kind: Namespace
metadata:
  name: raket
---
apiVersion: v1
kind: Secret
metadata:
  name: raket-secrets
  namespace: raket
type: Opaque
stringData:
  llm-api-key: "REPLACE_WITH_REAL_KEY"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: raket-controller
  namespace: raket
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: raket-controller
  namespace: raket
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: raket-controller
  namespace: raket
subjects:
  - kind: ServiceAccount
    name: raket-controller
    namespace: raket
roleRef:
  kind: Role
  name: raket-controller
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: raket-controller-config
  namespace: raket
data:
  FACT_GRAPH_PATH: "/data/fact_graph.json"
  LEDGER_PATH: "/data/ledger.json"
  VERIFY_WORK_DIR: "/tmp/raket-verify"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: raket-controller-data
  namespace: raket
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: raket-controller
  namespace: raket
spec:
  selector:
    app: raket-controller
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: raket-controller
  namespace: raket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: raket-controller
  template:
    metadata:
      labels:
        app: raket-controller
    spec:
      serviceAccountName: raket-controller
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: raket-controller-data
      containers:
        - name: controller
          image: raket-controller:latest
          command: ["/usr/local/bin/controller"]
          args:
            - "--epoch=300"
            - "--namespace=raket"
            - "--agent-image=raket-agent:latest"
            - "--warm-pool-size=2"
            - "--port=8080"
            - "--fact-graph-path=/data/fact_graph.json"
            - "--ledger-path=/data/ledger.json"
            - "--verify-timeout=30"
            - "--verify-work-dir=/tmp/raket-verify"
            - "--alignment-objective=Autonomous research maximizing Kubernetes RAKET coverage"
            - "--alignment-threshold=0.0"
          ports:
            - containerPort: 8080
          env:
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: raket-secrets
                  key: llm-api-key
            - name: RUST_LOG
              value: "info"
          envFrom:
            - configMapRef:
                name: raket-controller-config
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
